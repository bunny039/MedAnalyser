# Medical Report Analyzer - Docker Compose

version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
      - CHROMA_DB_PATH=/app/vector_db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ../uploads:/app/uploads
      - ../vector_db:/app/vector_db
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8501:8501"
    command: streamlit run frontend/app.py --server.address=0.0.0.0
    environment:
      - API_BASE_URL=http://backend:8000/api
    depends_on:
      - backend

volumes:
  ollama_data:
